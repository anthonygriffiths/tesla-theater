<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Custom Tesla Hub</title>
    <style>
        body {
            background-color: #111;
            color: white;
            font-family: system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 { margin-bottom: 30px; font-weight: 400; }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 180px);
            gap: 20px;
        }
        .btn {
    background-color: #222;
    border: 2px solid #444;
    color: white;
    padding: 20px 10px; /* Reduced padding slightly to give images more breathing room */
    text-align: center;
    text-decoration: none;
    border-radius: 12px;
    transition: background 0.2s;
    
    /* THE FIX: These 4 lines center your massive images perfectly */
    display: flex;
    align-items: center;
    justify-content: center;
    box-sizing: border-box; 
}
        .btn:hover { background-color: #333; border-color: #e81123; }
        .fullscreen-trigger {
            background-color: #e81123;
            grid-column: span 3;
            font-weight: bold;
            border: none;
        }
    </style>
</head>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Custom Tesla Hub</title>
    <style>
        body {
            background-color: #111;
            color: white;
            font-family: system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 { margin-bottom: 30px; font-weight: 400; }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 180px);
            gap: 20px;
        }
        .btn {
            background-color: #222;
            border: 2px solid #444;
            color: white;
            padding: 30px 10px;
            text-align: center;
            text-decoration: none;
            font-size: 18px;
            border-radius: 12px;
            transition: background 0.2s;
        }
        .btn:hover { background-color: #333; border-color: #e81123; }
        .fullscreen-trigger {
            background-color: #e81123;
            grid-column: span 3;
            font-weight: bold;
            border: none;
        }
    </style>
</head>
<body>

    <h1>Tesla Media Launcher</h1>

    <div class="grid">
        <!-- THE MAGIC BUTTON: Triggers the full-screen loop -->
        <a class="btn fullscreen-trigger" href="https://www.youtube.com/redirect?q=https://thefamilygriffiths.com">⚡ GO FULL SCREEN ⚡</a>

        <!-- YOUR SHORTCUTS (Will stay full-screen once triggered) -->
        <a class="btn" href="https://tv.apple.com" target="_self">
    <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/appletv.svg" alt="Apple TV+" style="height: 40px; filter: invert(1);">
</a>

<a class="btn" href="https://www.peacocktv.com" target="_self">
    <img src="https://images.pluto.tv/channels/65790dcf14fbe40008701eda/colorLogoSVG.svg" alt="Peacock" style="height: 38px;">
</a>

<a class="btn" href="https://www.paramountplus.com" target="_self">
    <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/paramountplus.svg" alt="Paramount+" style="height: 35px; filter: invert(1);">
</a>

<a class="btn" href="https://www.amazon.com/gp/video/storefront" target="_self">
    <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/primevideo.svg" alt="Amazon Prime" style="height: 32px; filter: invert(1);">
</a>

<a class="btn" href="https://www.willowtv.com" target="_self">
    <span style="font-family: 'Arial Black', sans-serif; font-size: 26px; color: #00A859; letter-spacing: -1px;">WILLOW</span>
</a>

<a class="btn" href="https://tv.youtube.com" target="_self">
    <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/youtubetv.svg" alt="YouTube TV" style="height: 32px; filter: invert(1);">
</a>
        
    </div>

</body>
</html>
